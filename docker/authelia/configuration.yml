---
# Authelia dev configuration for OIDC testing with Librarr

server:
  address: 'tcp://:9091'

log:
  level: debug

authentication_backend:
  file:
    path: /config/users_database.yml

session:
  secret: authelia-dev-session-secret
  cookies:
    - domain: localhost
      authelia_url: 'http://localhost:9091'

storage:
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt

access_control:
  default_policy: one_factor

identity_providers:
